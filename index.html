<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Menu Scanner Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    body { margin: 0; background: #000; font-family: -apple-system, sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    #container { position: relative; flex-grow: 1; background: #111; overflow: hidden; }
    video { width: 100%; height: 100%; object-fit: cover; }
    canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
    #status { position: fixed; top: 50px; width: 80%; left: 10%; background: rgba(0,0,0,0.85); color: white; padding: 12px; border-radius: 25px; text-align: center; z-index: 1000; font-size: 14px; border: 1px solid #34C759; font-weight: bold; }
    #controls { min-height: 160px; background: #1a1a1a; display: flex; flex-direction: column; justify-content: center; align-items: center; padding-bottom: 100px; z-index: 1000; }
    button { padding: 18px 40px; font-size: 18px; border-radius: 35px; border: none; font-weight: bold; width: 80%; transition: 0.2s; }
    #startBtn { background: #007AFF; color: white; }
    #scanBtn { background: #34C759; color: white; display: none; }
    .spinner { border: 3px solid #333; border-top: 3px solid #34C759; border-radius: 50%; width: 16px; height: 16px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 8px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="status">Syncing Menu...</div>
  
  <div id="container">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
  </div>

  <div id="controls">
    <button id="startBtn" onclick="initApp()">1. ENABLE CAMERA</button>
    <button id="scanBtn" onclick="takeSnapshot()">2. SCAN MENU</button>
  </div>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('overlay');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');
    const startBtn = document.getElementById('startBtn');
    const scanBtn = document.getElementById('scanBtn');
    
    let menuData = {};
    let worker = null;

    const GAS_URL = "https://script.google.com/macros/s/AKfycbzcvyRggwoelmh7hrDKZnelATDneBeFlYb90JexmJ8h28OTneJasntYmhFxVWrvndgl/exec";

    function clean(str) {
      return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().replace(/[^a-z0-9 ]/g, '').trim();
    }

    window.onload = async () => {
      try {
        const response = await fetch(GAS_URL);
        menuData = await response.json();
        status.innerText = "Menu Synced. Ready.";
      } catch (e) { status.innerText = "Sync Error."; }
    };

    async function initApp() {
      status.innerHTML = '<div class="spinner"></div> Opening Camera...';
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ 
          video: { facingMode: "environment", width: { ideal: 1920 } }, 
          audio: false 
        });
        video.srcObject = stream;
        startBtn.style.display = "none";
        scanBtn.style.display = "block";
        status.innerText = "Starting AI Engine...";
        worker = await Tesseract.createWorker('eng');
        status.innerText = "Point at Menu and Scan";
      } catch (err) { alert("Camera Error: " + err.message); }
    }

    async function takeSnapshot() {
      if (!worker) return;
      status.innerHTML = '<div class="spinner"></div> Analyzing...';
      scanBtn.disabled = true;
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      video.style.opacity = "0.3"; 

      try {
        const result = await worker.recognize(canvas);
        processLines(result.data.lines);
      } catch (err) { status.innerText = "Scan Failed."; resetUI(); }
    }

    function processLines(lines) {
      let matches = 0;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height); 

      lines.forEach(line => {
        const cleanScannedLine = clean(line.text);
        if (cleanScannedLine.length < 4) return;

        Object.keys(menuData).forEach(sheetItem => {
          const cleanItemName = clean(sheetItem);
          if (cleanScannedLine.includes(cleanItemName) && cleanItemName.length > 3) {
            // menuData[sheetItem] is now an ARRAY of descriptions
            drawOverlay(line.bbox, sheetItem, menuData[sheetItem]);
            matches++;
          }
        });
      });

      status.innerText = matches > 0 ? `Found ${matches} items!` : "No match. Try again.";
      scanBtn.disabled = false;
      setTimeout(() => { if(!scanBtn.disabled) resetUI(); }, 10000);
    }

    function drawOverlay(bbox, name, infoList) {
      // SETTINGS
      const fontSize = 18; // Half-size text
      const padding = 10;
      const lineHeight = fontSize + 8;
      
      ctx.font = `bold ${fontSize}px Arial`;
      
      // Calculate max width and total height
      const title = name.toUpperCase();
      let maxWidth = ctx.measureText(title).width;
      infoList.forEach(text => {
        const w = ctx.measureText("- " + text).width;
        if (w > maxWidth) maxWidth = w;
      });

      const totalBoxHeight = (lineHeight * (infoList.length + 1)) + (padding * 2);

      // 1. Draw pill-shaped background
      ctx.fillStyle = "rgba(0,0,0,0.85)";
      ctx.beginPath();
      ctx.roundRect(bbox.x0, bbox.y0 - totalBoxHeight - 10, maxWidth + (padding * 2), totalBoxHeight, 10);
      ctx.fill();

      // 2. Draw Item Title (Green)
      ctx.fillStyle = "#34C759";
      ctx.fillText(title, bbox.x0 + padding, bbox.y0 - totalBoxHeight + padding + fontSize);

      // 3. Draw All Descriptions Stacked (White)
      ctx.fillStyle = "#ffffff";
      ctx.font = `${fontSize - 2}px Arial`; // Slightly smaller for desc
      infoList.forEach((desc, index) => {
        const yOffset = bbox.y0 - totalBoxHeight + padding + fontSize + (lineHeight * (index + 1));
        ctx.fillText("• " + desc, bbox.x0 + padding, yOffset);
      });

      // 4. Draw underlining box on the menu
      ctx.strokeStyle = "#34C759";
      ctx.lineWidth = 3;
      ctx.strokeRect(bbox.x0, bbox.y0, bbox.x1 - bbox.x0, bbox.y1 - bbox.y0);
    }

    function resetUI() {
      video.style.opacity = "1";
      scanBtn.disabled = false;
      status.innerText = "Ready to Scan";
      ctx.clearRect(0,0, canvas.width, canvas.height);
    }
  </script>
</body>
</html>
