<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sommurai AR Pro v7.1</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    body { margin: 0; background: #000; font-family: -apple-system, sans-serif; height: 100vh; overflow: hidden; color: white; }
    #splash-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: space-between; z-index: 9999; padding: 60px 0; box-sizing: border-box; }
    #splash-buttons { width: 85%; display: flex; flex-direction: column; gap: 15px; }
    .splash-btn { padding: 20px; border-radius: 15px; border: none; font-weight: bold; font-size: 18px; cursor: pointer; color: white; background: #002d58; }
    #splash-screen img { width: 220px; height: auto; margin-bottom: 20px; }
    #container { position: relative; flex-grow: 1; background: #000; overflow: hidden; display: flex; }
    video { width: 100%; height: 100%; object-fit: cover; z-index: 1; }
    canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; pointer-events: none; z-index: 5; }
    #menu-nav { position: fixed; top: 50px; left: 15px; display: none; flex-direction: column; gap: 15px; z-index: 3000; }
    .menu-trigger { background: rgba(40,40,40,0.95); border: 1px solid #555; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; color: white; }
    .menu-content { position: absolute; left: 60px; top: 0; background: #1a1a1a; border: 1px solid #444; border-radius: 15px; display: none; flex-direction: column; min-width: 220px; max-height: 400px; overflow-y: auto; }
    #status { position: fixed; top: 65px; left: 50%; transform: translateX(-50%); width: 75%; background: rgba(0,0,0,0.85); color: #34C759; padding: 12px; border-radius: 25px; text-align: center; font-size: 12px; z-index: 1000; border: 1px solid #34C759; font-weight: bold; pointer-events: none; }
    #startOverBtn { position: fixed; top: 15px; left: 50%; transform: translateX(-50%); background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(255,255,255,0.4); color: white; padding: 8px 20px; border-radius: 20px; font-size: 12px; z-index: 5000; display: none; font-weight: bold; }
    #controls { min-height: 180px; background: #1a1a1a; display: none; flex-direction: column; justify-content: center; align-items: center; padding-bottom: 100px; border-top: 1px solid #333; z-index: 1000; }
    .app-active #controls { display: flex !important; }
    .app-active #menu-nav { display: flex !important; }
    .main-btn { padding: 22px 0; font-size: 20px; border-radius: 35px; border: none; font-weight: bold; width: 85%; background: #34C759; color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
  </style>
</head>
<body id="body-tag">

  <button id="startOverBtn" onclick="location.reload()">↺ START OVER</button>

  <div id="splash-screen">
    <div id="splash-buttons">
        <button class="splash-btn" onclick="startFlow('Scan Wine List')">STEP 1: SCAN WINE LIST</button>
        <button class="splash-btn" style="background:#34C759" onclick="startFlow('Scan Menu')">STEP 2: SCAN FOOD MENU</button>
        <button class="splash-btn" style="background:#444" onclick="startFlow('Menu List')">DATABASE VIEW</button>
    </div>
    <img src="logo.png" alt="Sommurai Logo">
  </div>

  <div id="menu-nav">
    <div class="menu-group"><div class="menu-trigger" onclick="toggleMenu('resMenu')">🍴</div><div id="resMenu" class="menu-content"></div></div>
    <div class="menu-group" id="logic-trigger"><div class="menu-trigger" onclick="toggleMenu('modeMenu')">💡</div><div id="modeMenu" class="menu-content">
        <div class="menu-item active" onclick="setMode('somm', this)" style="color:#34C759; padding:15px; border-bottom:1px solid #333;">Somm Pick</div>
        <div class="menu-item" onclick="setMode('ai', this)" style="color:#ccc; padding:15px; border-bottom:1px solid #333;">AI Somm Pick</div>
        <div class="menu-item" onclick="setMode('expert', this)" style="color:#ccc; padding:15px; border-bottom:1px solid #333;">Expert</div>
        <div class="menu-item" onclick="setMode('basic', this)" style="color:#ccc; padding:15px; border-bottom:1px solid #333;">Basic</div>
    </div></div>
  </div>

  <div id="status">Syncing...</div>
  <div id="container"><video id="video" autoplay playsinline muted></video><canvas id="overlay"></canvas></div>
  <div id="controls"><button id="actionBtn" class="main-btn" onclick="handleAction()">ACTION</button></div>

  <script>
    const video = document.getElementById('video'), canvas = document.getElementById('overlay'), ctx = canvas.getContext('2d');
    const status = document.getElementById('status'), actionBtn = document.getElementById('actionBtn'), startOverBtn = document.getElementById('startOverBtn');
    
    let rawSheetData = [], logicRules = [], activeMenu = {}, currentMode = 'somm', appMode = '';
    let worker = null, wineListRaw = "", wineListTextClean = "", isScanning = false, currentRestaurant = "GLOBAL";
    let wineListBuffer = new Set();

    const GAS_URL = "https://script.google.com/macros/s/AKfycbz4vSWNVQ8Fnlhu73RZgNq4wszFd4WWStwSxlohcoDrAas6mrxvcEgzHJfGvDSGIIix/exec";

    async function startFlow(mode) {
      appMode = mode;
      document.getElementById('body-tag').classList.add('app-active');
      document.getElementById('splash-screen').style.display = 'none';
      startOverBtn.style.display = 'block';
      updateActionBtnUI();
      try {
        const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: { ideal: 1280 } } });
        video.srcObject = s; video.onloadedmetadata = () => video.play();
        loadSheetData(); initAI();
      } catch (e) { alert("Camera Error"); }
    }

    async function initAI() { worker = await Tesseract.createWorker('eng', 1); status.innerText = "Engine Ready"; }

    async function loadSheetData() {
      const resp = await fetch(GAS_URL, { redirect: 'follow' });
      const data = await resp.json();
      rawSheetData = data.master; logicRules = data.logic;
      populateRestaurants();
    }

    function populateRestaurants() {
      const list = [...new Set(rawSheetData.slice(1).map(r => r[0]))].filter(r => r).sort();
      document.getElementById('resMenu').innerHTML = `<div class="menu-item" onclick="setRes('GLOBAL')" style="padding:15px; border-bottom:1px solid #333;">🌎 Global Expert Logic</div>` + list.map(r => `<div class="menu-item" onclick="setRes('${r.replace(/'/g,"")}')" style="padding:15px; border-bottom:1px solid #333;">${r}</div>`).join('');
      setRes('GLOBAL');
    }

    function setRes(res) {
      activeMenu = {}; currentRestaurant = res;
      rawSheetData.slice(1).forEach(row => { if (row[0] === res) { const k = clean(row[1]); if (!activeMenu[k]) activeMenu[k] = []; activeMenu[k].push(row); } });
      document.getElementById('resMenu').style.display = 'none';
      status.innerText = res + " Brain Active";
    }

    function handleAction() {
      if (appMode === 'Scan Wine List' && isScanning) { finalizeWine(); return; }
      isScanning = !isScanning;
      updateActionBtnUI();
      if (isScanning) runScanLoop();
      else ctx.clearRect(0,0,canvas.width,canvas.height);
    }

    function updateActionBtnUI() {
      if (appMode === 'Scan Wine List') {
        actionBtn.innerText = isScanning ? "FINISH WINE SCAN" : "START WINE INDEXING";
        actionBtn.style.background = isScanning ? "#2196F3" : "#002d58";
      } else {
        actionBtn.innerText = isScanning ? "STOP LIVE SCAN" : "START LIVE MENU SCAN";
        actionBtn.style.background = isScanning ? "#f44336" : "#34C759";
      }
    }

    async function runScanLoop() {
      if (!isScanning || !worker) return;
      if (canvas.width !== video.videoWidth) { canvas.width = video.videoWidth; canvas.height = video.videoHeight; }
      const off = document.createElement('canvas'); off.width = 800; off.height = video.videoHeight * (800 / video.videoWidth);
      off.getContext('2d').drawImage(video, 0, 0, off.width, off.height);
      try {
        const result = await worker.recognize(off);
        if (appMode === 'Scan Wine List') {
            result.data.lines.forEach(l => { if (clean(l.text).length > 7) wineListBuffer.add(l.text); });
            status.innerText = `Indexing: ${wineListBuffer.size} drinks found`;
        } else {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            processMatches(result.data.lines, 800, off.height);
        }
      } catch (e) {}
      if (isScanning) setTimeout(runScanLoop, 500);
    }

    function finalizeWine() {
      isScanning = false;
      wineListRaw = Array.from(wineListBuffer).join('\n');
      wineListTextClean = clean(wineListRaw);
      const off = document.createElement('canvas'); off.width = 1200; off.height = video.videoHeight * (1200 / video.videoWidth);
      off.getContext('2d').drawImage(video, 0, 0, off.width, off.height);
      fetch(GAS_URL, { method: "POST", body: JSON.stringify({ base64: off.toDataURL('image/jpeg', 0.5), ocr: wineListRaw, type: 'Scan Wine List', restaurant: currentRestaurant }) });
      appMode = 'Scan Menu'; updateActionBtnUI();
      status.innerText = "Wine List Indexed. Scan Menu!";
      handleAction();
    }

    // --- REVERTED STABLE MATCHING ENGINE (v4.9 Logic) ---
    function processMatches(lines, sw, sh) {
      const sx = canvas.width / sw, sy = canvas.height / sh;
      lines.forEach(line => {
        const scanLineClean = clean(line.text);
        
        // 1. PRIORITY: Database Match (Bistro Jeanty, etc.)
        if (currentRestaurant !== "GLOBAL") {
            Object.keys(activeMenu).forEach(dishKey => {
                // ANCHOR: Check if the menu line includes the primary words of the dish
                const dishWords = dishKey.split(' ').filter(w => w.length > 4);
                if (dishWords.every(w => scanLineClean.includes(w)) && dishKey.length > 4) {
                    const row = activeMenu[dishKey][0];
                    let opts = (currentMode === 'somm' ? [row[3]] : currentMode === 'ai' ? [row[4], row[5]] : [row[7], row[8]]);
                    // Skip wine list filter if at a known restaurant (Direct database pairing)
                    drawInfoBox(line.bbox, row[1], opts, sx, sy);
                }
            });
        } else {
            // 2. FALLBACK: Global Logic Rules Match (Sailor / New Menus)
            logicRules.slice(1).forEach(rule => {
                const foodName = clean(rule[1]);
                if (scanLineClean.includes(foodName) && foodName.length > 4) {
                    let targetVar = (currentMode === 'somm' ? rule[3] : currentMode === 'ai' ? rule[4] + "," + rule[5] : rule[7] + "," + rule[8]);
                    const foundWines = findWineMatches(targetVar);
                    if (foundWines.length > 0) drawInfoBox(line.bbox, rule[1], foundWines, sx, sy);
                }
            });
        }
      });
    }

    function findWineMatches(vStr) {
        if (!vStr || !wineListRaw) return [];
