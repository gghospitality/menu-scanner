<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Somm AI Scanner</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    body { margin: 0; background: #000; font-family: -apple-system, sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; color: white; }
    
    #settings { background: #1a1a1a; padding: 15px; border-bottom: 1px solid #333; z-index: 2000; }
    .select-group { margin-bottom: 10px; display: flex; flex-direction: column; }
    label { font-size: 11px; color: #888; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px; }
    select { background: #333; color: white; border: 1px solid #444; padding: 12px; border-radius: 10px; font-size: 14px; width: 100%; -webkit-appearance: none; }

    #container { position: relative; flex-grow: 1; background: #111; overflow: hidden; }
    video { width: 100%; height: 100%; object-fit: cover; }
    canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
    
    #status { position: fixed; top: 180px; width: 80%; left: 10%; background: rgba(0,0,0,0.85); color: #34C759; padding: 10px; border-radius: 20px; text-align: center; z-index: 1000; font-size: 12px; border: 1px solid #34C759; }

    #controls { min-height: 160px; background: #1a1a1a; display: flex; flex-direction: column; justify-content: center; align-items: center; padding-bottom: 110px; z-index: 1000; }
    button { padding: 18px 40px; font-size: 18px; border-radius: 35px; border: none; font-weight: bold; width: 85%; }
    #startBtn { background: #007AFF; color: white; }
    #scanBtn { background: #34C759; color: white; display: none; }
    
    .spinner { border: 2px solid #333; border-top: 2px solid #34C759; border-radius: 50%; width: 14px; height: 14px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 5px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="settings">
    <div class="select-group">
      <label>1. Restaurant Menu</label>
      <select id="restaurantSelect" onchange="filterData()">
        <option>Loading Master Sheet...</option>
      </select>
    </div>
    <div class="select-group">
      <label>2. Display Mode</label>
      <select id="modeSelect">
        <option value="somm">Somm Pick (Col D)</option>
        <option value="ai">AI Somm Pick (Cols E, F)</option>
        <option value="expert">Expert (Cols H, I, J)</option>
        <option value="basic">Basic (Cols K, L, M)</option>
      </select>
    </div>
  </div>

  <div id="status">Ready</div>
  
  <div id="container">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
  </div>

  <div id="controls">
    <button id="startBtn" onclick="initApp()">3. ENABLE CAMERA</button>
    <button id="scanBtn" onclick="takeSnapshot()">4. SCAN WINE LIST</button>
  </div>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('overlay');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');
    const startBtn = document.getElementById('startBtn');
    const scanBtn = document.getElementById('scanBtn');
    const resSelect = document.getElementById('restaurantSelect');
    const modeSelect = document.getElementById('modeSelect');
    
    let rawSheetData = []; 
    let activeMenu = {}; 
    let worker = null;

    // --- YOUR UPDATED GAS URL ---
    const GAS_URL = "https://script.google.com/macros/s/AKfycbysn-9xM-WFOeDr-RPrmkNsO5ch7sOqQ9_zWZZL_IrXUtygQnlHnz0wAfxyxYsDwXMw/exec";

    function clean(str) {
      return str ? str.toString().normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().replace(/[^a-z0-9 ]/g, '').trim() : "";
    }

    window.onload = loadSheetData;

    async function loadSheetData() {
      try {
        status.innerText = "Connecting to Master Sheet...";
        // Fix for Sync Error: Ensure redirect is followed
        const response = await fetch(GAS_URL, { redirect: 'follow' });
        rawSheetData = await response.json();
        
        if (rawSheetData.error) throw new Error(rawSheetData.error);
        
        populateRestaurants();
        status.innerText = "Data Synced Successfully.";
      } catch (e) { 
        status.innerText = "Sync Error: Check Connection";
        alert("Sync Error: " + e.message);
      }
    }

    function populateRestaurants() {
      // Get unique values from Column A
      const restaurants = [...new Set(rawSheetData.slice(1).map(row => row[0]))].filter(r => r).sort();
      resSelect.innerHTML = restaurants.map(r => `<option value="${r}">${r}</option>`).join('');
      filterData();
    }

    function filterData() {
      const selectedRes = resSelect.value;
      activeMenu = {};
      
      rawSheetData.slice(1).forEach(row => {
        if (row[0] === selectedRes) {
          const wineName = clean(row[1]); // Column B
          if (!activeMenu[wineName]) activeMenu[wineName] = [];
          activeMenu[wineName].push(row);
        }
      });
      status.innerText = `${selectedRes} Menu Active`;
    }

    async function initApp() {
      status.innerHTML = '<div class="spinner"></div> Opening Camera...';
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ 
          video: { facingMode: "environment", width: { ideal: 1920 } }, 
          audio: false 
        });
        video.srcObject = stream;
        startBtn.style.display = "none";
        scanBtn.style.display = "block";
        worker = await Tesseract.createWorker('eng');
        status.innerText = "Ready to Scan";
      } catch (err) { alert("Camera Error: " + err.message); }
    }

    async function takeSnapshot() {
      status.innerHTML = '<div class="spinner"></div> Analyzing Wine List...';
      scanBtn.disabled = true;
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      video.style.opacity = "0.3"; 

      try {
        const result = await worker.recognize(canvas);
        processLines(result.data.lines);
      } catch (err) { resetUI(); }
    }

    function processLines(lines) {
      let matches = 0;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height); 

      lines.forEach(line => {
        const scanText = clean(line.text);
        if (scanText.length < 5) return;

        Object.keys(activeMenu).forEach(wineKey => {
          // If the scanned line contains the wine name from our menu
          if (scanText.includes(wineKey) && wineKey.length > 4) {
            const wineRows = activeMenu[wineKey];
            drawOverlay(line.bbox, wineRows[0][1], wineRows);
            matches++;
          }
        });
      });

      status.innerText = matches > 0 ? `Matched ${matches} Wines` : "No matches found.";
      scanBtn.disabled = false;
      setTimeout(() => { if(!scanBtn.disabled) resetUI(); }, 12000);
    }

    function drawOverlay(bbox, originalName, wineRows) {
      const mode = modeSelect.value;
      const fontSize = 16;
      const lineHeight = 22;
      const padding = 12;

      // --- CARRIAGE RETURN LOGIC ---
      // Instead of combining columns with "|", we push each column into the array separately.
      let displayTexts = [];
      wineRows.forEach(row => {
        if (mode === "somm") {
            if(row[3]) displayTexts.push(row[3]);
        }
        if (mode === "ai") {
            if(row[4]) displayTexts.push(row[4]); // Col E
            if(row[5]) displayTexts.push(row[5]); // Col F
        }
        if (mode === "expert") {
            if(row[7]) displayTexts.push(row[7]); // Col H
            if(row[8]) displayTexts.push(row[8]); // Col I
            if(row[9]) displayTexts.push(row[9]); // Col J
        }
        if (mode === "basic") {
            if(row[10]) displayTexts.push(row[10]); // Col K
            if(row[11]) displayTexts.push(row[11]); // Col L
            if(row[12]) displayTexts.push(row[12]); // Col M
        }
      });

      ctx.font = `bold ${fontSize}px Arial`;
      const title = originalName.toUpperCase();
      let boxWidth = ctx.measureText(title).width;
      
      displayTexts.forEach(t => {
        const w = ctx.measureText("• " + t).width;
        if (w > boxWidth) boxWidth = w;
      });

      // Total height = (Title Line + All Content Lines)
      const totalHeight = (displayTexts.length + 1) * lineHeight + (padding * 2);

      // Draw Background
      ctx.fillStyle = "rgba(0,0,0,0.95)";
      ctx.beginPath();
      ctx.roundRect(bbox.x0, bbox.y0 - totalHeight - 10, boxWidth + (padding * 2), totalHeight, 10);
      ctx.fill();

      // Draw Wine Title (Green)
      ctx.fillStyle = "#34C759";
      ctx.fillText(title, bbox.x0 + padding, bbox.y0 - totalHeight + padding + fontSize);

      // Draw Info Lines (White)
      ctx.fillStyle = "white";
      ctx.font = `${fontSize - 2}px Arial`;
      displayTexts.forEach((txt, i) => {
        const yPos = bbox.y0 - totalHeight + padding + fontSize + (lineHeight * (i + 1));
        ctx.fillText("• " + txt, bbox.x0 + padding, yPos);
      });

      // Highlight the text on the menu
      ctx.strokeStyle = "#34C759";
      ctx.lineWidth = 3;
      ctx.strokeRect(bbox.x0, bbox.y0, bbox.x1 - bbox.x0, bbox.y1 - bbox.y0);
    }

    function resetUI() {
      video.style.opacity = "1";
      scanBtn.disabled = false;
      status.innerText = "Ready to Scan";
      ctx.clearRect(0,0, canvas.width, canvas.height);
    }
  </script>
</body>
</html>
