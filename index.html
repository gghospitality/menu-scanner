<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sommurai AI Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    body { margin: 0; background: #000; font-family: -apple-system, sans-serif; height: 100vh; overflow: hidden; color: white; display: flex; flex-direction: column; }
    
    /* SPLASH SCREEN */
    #splash-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #ffffff; display: flex; flex-direction: column; align-items: center; justify-content: space-between; z-index: 9999; padding: 60px 0; box-sizing: border-box; }
    #splash-buttons { width: 85%; display: flex; flex-direction: column; gap: 15px; }
    .splash-btn { padding: 20px; border-radius: 15px; border: none; font-weight: bold; font-size: 18px; cursor: pointer; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
    .btn-blue { background: #002d58; }
    .btn-green { background: #34C759; }
    #splash-screen img { width: 70%; max-width: 300px; }

    /* RESET BUTTON */
    #startOverBtn { position: fixed; top: 15px; left: 50%; transform: translateX(-50%); background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(255,255,255,0.4); color: white; padding: 8px 20px; border-radius: 20px; font-size: 12px; z-index: 5000; display: none; font-weight: bold; }

    /* UI LAYOUT */
    #container { position: relative; flex-grow: 1; background: #000; overflow: hidden; }
    video { width: 100%; height: 100%; object-fit: cover; }
    canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; pointer-events: none; z-index: 5; }
    
    /* MENUS */
    #menu-nav { position: fixed; top: 55px; left: 15px; display: flex; flex-direction: column; gap: 15px; z-index: 3000; display: none; }
    .menu-trigger { background: rgba(40,40,40,0.95); border: 1px solid #555; color: white; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; }
    .menu-content { position: absolute; left: 60px; top: 0; background: rgba(25, 25, 25, 0.98); border: 1px solid #444; border-radius: 15px; display: none; flex-direction: column; min-width: 220px; max-height: 400px; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
    .menu-item { padding: 16px; border-bottom: 1px solid #333; font-size: 14px; }
    .menu-item.active { border-left: 5px solid #34C759; background: #222; font-weight: bold; }

    #status { position: fixed; top: 65px; left: 50%; transform: translateX(-50%); width: 75%; background: rgba(0,0,0,0.85); color: #34C759; padding: 12px; border-radius: 25px; text-align: center; font-size: 12px; z-index: 1000; border: 1px solid #34C759; font-weight: bold; pointer-events: none; }
    
    #controls { min-height: 180px; background: #1a1a1a; display: flex; flex-direction: column; justify-content: center; align-items: center; padding-bottom: 100px; border-top: 1px solid #333; z-index: 1000; }
    .main-btn { padding: 20px 40px; font-size: 18px; border-radius: 35px; border: none; font-weight: bold; width: 85%; background: #34C759; color: white; }
    
    .spinner { border: 2px solid #333; border-top: 2px solid #34C759; border-radius: 50%; width: 14px; height: 14px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 5px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <button id="startOverBtn" onclick="location.reload()">↺ START OVER</button>

  <div id="splash-screen">
    <div id="splash-buttons">
        <button class="splash-btn btn-blue" onclick="startFlow('Scan Menu')">Step 2: Live Menu Scan</button>
        <button class="splash-btn btn-blue" onclick="startFlow('Scan Wine List')">Step 1: Scan Wine List</button>
        <button class="splash-btn btn-green" onclick="startFlow('Menu List')">Database Search</button>
    </div>
    <img src="logo.png" alt="Sommurai Logo">
  </div>

  <div id="menu-nav">
    <div class="menu-group"><div class="menu-trigger" onclick="toggleMenu('resMenu')">🍴</div><div id="resMenu" class="menu-content"></div></div>
    <div class="menu-group" id="logic-trigger"><div class="menu-trigger" onclick="toggleMenu('modeMenu')">💡</div><div id="modeMenu" class="menu-content">
        <div class="menu-item active" onclick="setMode('somm', this)">Somm Pick (D)</div>
        <div class="menu-item" onclick="setMode('ai', this)">AI Somm Pick (E,F)</div>
        <div class="menu-item" onclick="setMode('expert', this)">Expert (H,I,J)</div>
        <div class="menu-item" onclick="setMode('basic', this)">Basic (K,L,M)</div>
    </div></div>
  </div>

  <div id="status">Syncing...</div>
  <div id="container"><video id="video" autoplay playsinline muted></video><canvas id="overlay"></canvas></div>
  <div id="controls"><button id="actionBtn" class="main-btn" onclick="handleAction()">ACTION</button></div>

  <script>
    const video = document.getElementById('video'), canvas = document.getElementById('overlay'), ctx = canvas.getContext('2d');
    const status = document.getElementById('status'), actionBtn = document.getElementById('actionBtn'), startOverBtn = document.getElementById('startOverBtn');
    
    let rawSheetData = [], activeMenu = {}, currentMode = 'somm', appMode = '', worker = null, lastScannedWineText = "";
    let isLiveScanning = false, persistentMatches = [];
    const DECAY_TIME = 5000;

    const GAS_URL = "https://script.google.com/macros/s/AKfycbwM9l4N4mwDbDLWWMhBP5hzYv9BuVBAia7DS01iLfvEUjkKXsKVyOMgHzEsQAESSjrH/exec";

    async function startFlow(mode) {
      appMode = mode;
      const cameraStarted = await initCamera();
      if (cameraStarted) {
        document.getElementById('splash-screen').style.display = 'none';
        document.getElementById('menu-nav').style.display = 'flex';
        startOverBtn.style.display = 'block';
        actionBtn.innerText = (mode === 'Scan Menu') ? "START LIVE SCAN" : "CAPTURE WINE LIST";
        loadSheetData();
        initAI();
        requestAnimationFrame(renderLoop);
      }
    }

    async function initCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: { ideal: 1280 } }, audio: false });
        video.srcObject = stream;
        return new Promise((resolve) => { video.onloadedmetadata = () => { video.play(); resolve(true); }; });
      } catch (e) { alert("Camera Error"); return false; }
    }

    async function initAI() {
      if (worker) return;
      worker = await Tesseract.createWorker('eng', 1, {
        logger: m => { if (m.status === 'recognizing') status.innerText = `AI Analysis: ${Math.round(m.progress * 100)}%`; }
      });
      status.innerText = "AI Ready";
    }

    async function loadSheetData() {
      const resp = await fetch(GAS_URL, { redirect: 'follow' });
      rawSheetData = await resp.json();
      populateRestaurants();
    }

    function populateRestaurants() {
      const resContainer = document.getElementById('resMenu');
      const restaurants = [...new Set(rawSheetData.slice(1).map(row => row[0]))].filter(r => r).sort();
      let html = `<div class="menu-item active" onclick="setRestaurant('GLOBAL', this)">🌎 GLOBAL EXPERT MODE</div>`;
      html += restaurants.map(r => `<div class="menu-item" onclick="setRestaurant('${r.replace(/'/g, "\\'")}', this)">${r}</div>`).join('');
      resContainer.innerHTML = html;
      setRestaurant('GLOBAL', resContainer.firstChild); 
    }

    function setRestaurant(res, el) {
      activeMenu = {};
      currentRestaurant = res;
      document.querySelectorAll('#resMenu .menu-item').forEach(i => i.classList.remove('active'));
      if(el) el.classList.add('active');
      rawSheetData.slice(1).forEach(row => { 
        if (res === 'GLOBAL' || row[0] === res) { 
          const item = clean(row[1]); if (!activeMenu[item]) activeMenu[item] = []; activeMenu[item].push(row); 
        } 
      });
      document.getElementById('resMenu').style.display = 'none';
      status.innerText = (res === 'GLOBAL') ? "Mode: Expert Global" : `${res} Menu Active`;
    }

    function setMode(mode, el) {
      currentMode = mode;
      document.querySelectorAll('#modeMenu .menu-item').forEach(i => i.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('modeMenu').style.display = 'none';
      persistentMatches = [];
    }

    async function handleAction() {
      if (appMode === 'Scan Wine List') captureWineList();
      else toggleLiveScan();
    }

    async function captureWineList() {
      if (!worker) return;
      status.innerHTML = '<div class="spinner"></div> Indexing Wine List...';
      const off = document.createElement('canvas');
      off.width = 1200; off.height = video.videoHeight * (1200 / video.videoWidth);
      const octx = off.getContext('2d');
      octx.filter = "contrast(1.5) grayscale(1)";
      octx.drawImage(video, 0, 0, off.width, off.height);
      const result = await worker.recognize(off);
      lastScannedWineText = clean(result.data.text);
      const base64 = off.toDataURL('image/jpeg', 0.6);
      fetch(GAS_URL, { method: "POST", body: JSON.stringify({ base64: base64, ocr: result.data.text, type: 'Scan Wine List', restaurant: currentRestaurant }) });
      alert("Wine List Saved! Switch to Step 2.");
      appMode = 'Scan Menu';
      actionBtn.innerText = "START LIVE SCAN";
    }

    async function toggleLiveScan() {
      if (video.paused || !video.srcObject) initCamera();
      isLiveScanning = !isLiveScanning;
      actionBtn.innerText = isLiveScanning ? "STOP SCAN" : "START LIVE SCAN";
      actionBtn.style.background = isLiveScanning ? "#f44336" : "#34C759";
      if (isLiveScanning) runAutoScan();
    }

    async function runAutoScan() {
      if (!isLiveScanning || !worker) return;
      const off = document.createElement('canvas'); off.width = 800; off.height = video.videoHeight * (800 / video.videoWidth);
      off.getContext('2d').drawImage(video, 0, 0, off.width, off.height);
      try { const result = await worker.recognize(off); updateBuffer(result.data.lines, off.width, off.height); } catch (e) {}
      if (isLiveScanning) setTimeout(runAutoScan, 500);
    }

    function isWineMatch(wineName) {
        if (!lastScannedWineText) return true;
        const cleanRec = clean(wineName);
        const tokens = cleanRec.split(' ').filter(t => t.length > 4 && isNaN(t));
        if (tokens.length === 0) return lastScannedWineText.includes(cleanRec);
        const matchCount = tokens.filter(t => lastScannedWineText.includes(t)).length;
        return matchCount >= (tokens.length * 0.4);
    }

    function updateBuffer(lines, scanW, scanH) {
      const now = Date.now(), scaleX = canvas.width / scanW, scaleY = canvas.height / scanH;
      lines.forEach(line => {
        const scanText = clean(line.text);
        if (scanText.length < 4) return;
        Object.keys(activeMenu).forEach(foodKey => {
          if (scanText.includes(foodKey) || (foodKey.length > 6 && scanText.includes(foodKey.substring(0, 6)))) {
            const rows = activeMenu[foodKey];
            rows.forEach(row => {
              let wines = (currentMode === "somm") ? [row[3]] : (currentMode === "ai") ? [row[4], row[5]] : (currentMode === "expert") ? [row[7], row[8], row[9]] : [row[10], row[11], row[12]];
              const valid = wines.filter(w => isWineMatch(w));
              if (valid.length > 0) {
                const scaledBbox = { x0: line.bbox.x0 * scaleX, y0: line.bbox.y0 * scaleY, x1: line.bbox.x1 * scaleX, y1: line.bbox.y1 * scaleY };
                const idx = persistentMatches.findIndex(m => m.itemName === foodKey);
                if (idx > -1) { persistentMatches[idx].bbox = scaledBbox; persistentMatches[idx].lastSeen = now; persistentMatches[idx].displayData = valid; }
                else { persistentMatches.push({ itemName: row[1], bbox: scaledBbox, displayData: valid, lastSeen: now }); }
              }
            });
          }
        });
      });
    }

    function renderLoop() {
      if (video.readyState === video.HAVE_ENOUGH_DATA) {
          if (canvas.width !== video.videoWidth) { canvas.width = video.videoWidth; canvas.height = video.videoHeight; }
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          const now = Date.now();
          persistentMatches = persistentMatches.filter(m => now - m.lastSeen < DECAY_TIME);
          persistentMatches.forEach(match => {
