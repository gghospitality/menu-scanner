<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sommurai AI</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    body { margin: 0; background: #000; font-family: -apple-system, sans-serif; height: 100vh; overflow: hidden; color: white; display: flex; flex-direction: column; }
    #splash-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #ffffff; display: flex; flex-direction: column; align-items: center; justify-content: space-between; z-index: 9999; padding: 60px 0; box-sizing: border-box; }
    #splash-buttons { width: 85%; display: flex; flex-direction: column; gap: 15px; }
    .splash-btn { padding: 20px; border-radius: 15px; border: none; font-weight: bold; font-size: 18px; cursor: pointer; color: white; }
    .btn-blue { background: #002d58; }
    .btn-green { background: #34C759; }
    #splash-screen img { width: 70%; max-width: 300px; }
    #container { position: relative; flex-grow: 1; background: #111; overflow: hidden; }
    video { width: 100%; height: 100%; object-fit: cover; }
    canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
    #menu-nav { position: fixed; top: 50px; left: 15px; display: flex; flex-direction: column; gap: 15px; z-index: 3000; display: none; }
    .menu-trigger { background: rgba(40,40,40,0.95); border: 1px solid #555; color: white; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; }
    .menu-content { position: absolute; left: 60px; top: 0; background: rgba(25,25,25,0.98); border: 1px solid #444; border-radius: 15px; display: none; flex-direction: column; min-width: 220px; max-height: 400px; overflow-y: auto; }
    .menu-item { padding: 16px; border-bottom: 1px solid #333; font-size: 14px; }
    .menu-item.active { border-left: 5px solid #34C759; background: #222; font-weight: bold; }
    #status { position: fixed; top: 55px; left: 50%; transform: translateX(-50%); width: 70%; background: rgba(0,0,0,0.85); color: #34C759; padding: 12px; border-radius: 25px; text-align: center; font-size: 13px; z-index: 1000; border: 1px solid #34C759; font-weight: bold; pointer-events: none; }
    #controls { min-height: 200px; background: #1a1a1a; display: flex; flex-direction: column; justify-content: center; align-items: center; padding-bottom: 125px; border-top: 1px solid #333; }
    #mainBtn { padding: 20px 40px; font-size: 18px; border-radius: 35px; border: none; font-weight: bold; width: 85%; background: #34C759; color: white; }
    .spinner { border: 2px solid #333; border-top: 2px solid #34C759; border-radius: 50%; width: 14px; height: 14px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 5px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="splash-screen">
    <div id="splash-buttons">
        <button class="splash-btn btn-blue" onclick="startFlow('Scan Menu')">Scan Menu</button>
        <button class="splash-btn btn-blue" onclick="startFlow('Scan Wine List')">Scan Wine List</button>
        <button class="splash-btn btn-green" onclick="startFlow('Menu List')">Menu List</button>
    </div>
    <img src="logo.png" alt="Sommurai Logo">
  </div>

  <div id="menu-nav">
    <div class="menu-group"><div class="menu-trigger" onclick="toggleMenu('resMenu')">🍴</div><div id="resMenu" class="menu-content"></div></div>
    <div class="menu-group" id="logic-trigger" style="display:none;"><div class="menu-trigger" onclick="toggleMenu('modeMenu')">💡</div><div id="modeMenu" class="menu-content">
        <div class="menu-item active" onclick="setMode('somm', this)">Somm Pick (D)</div>
        <div class="menu-item" onclick="setMode('ai', this)">AI Somm Pick (E,F)</div>
        <div class="menu-item" onclick="setMode('expert', this)">Expert (H,I,J)</div>
        <div class="menu-item" onclick="setMode('basic', this)">Basic (K,L,M)</div>
    </div></div>
  </div>

  <div id="status">Ready</div>
  <div id="container"><video id="video" autoplay playsinline muted></video><canvas id="overlay"></canvas></div>
  <div id="controls"><button id="mainBtn" onclick="handleAction()">ACTION</button></div>

  <script>
    const video = document.getElementById('video'), canvas = document.getElementById('overlay'), ctx = canvas.getContext('2d');
    const status = document.getElementById('status'), mainBtn = document.getElementById('mainBtn');
    let rawSheetData = [], activeMenu = {}, currentMode = 'somm', appMode = '', worker = null;

    // !!! PASTE YOUR NEW DEPLOYMENT URL HERE !!!
    const GAS_URL = "https://script.google.com/macros/s/AKfycbw96pTd_WJ2AYuZa5ZUP2r16ja4LrmfCEFUN45fpRtC75RU5yvNfu3RWchonL-J2n-r/exec";

    async function startFlow(mode) {
      appMode = mode;
      document.getElementById('splash-screen').style.display = 'none';
      if (mode === 'Menu List') {
        document.getElementById('menu-nav').style.display = 'flex';
        document.getElementById('logic-trigger').style.display = 'block';
        mainBtn.innerText = "SCAN WINE LIST";
      } else {
        mainBtn.innerText = "CAPTURE & UPLOAD";
      }
      initCamera();
      loadSheetData();
    }

    async function initCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: { ideal: 1920 } }, audio: false });
        video.srcObject = stream;
        status.innerText = "Camera Ready";
        worker = await Tesseract.createWorker('eng');
      } catch (e) { status.innerText = "Camera Error"; }
    }

    async function loadSheetData() {
      try {
        status.innerText = "Syncing Data...";
        const resp = await fetch(GAS_URL, { redirect: 'follow' });
        const data = await resp.json();
        if (data.error) throw new Error(data.error);
        rawSheetData = data;
        populateRestaurants();
        status.innerText = "Menu Synced";
      } catch (e) { 
        status.innerText = "Sync Error"; 
        alert("Sync Error: " + e.message);
      }
    }

    function populateRestaurants() {
      const resContainer = document.getElementById('resMenu');
      const restaurants = [...new Set(rawSheetData.slice(1).map(row => row[0]))].filter(r => r).sort();
      resContainer.innerHTML = restaurants.map(r => `<div class="menu-item" onclick="setRestaurant('${r.replace(/'/g, "\\'")}', this)">${r}</div>`).join('');
      if (restaurants.length > 0) setRestaurant(restaurants[0], null);
    }

    function setRestaurant(res, el) {
      activeMenu = {};
      rawSheetData.slice(1).forEach(row => { if (row[0] === res) { const wine = clean(row[1]); if (!activeMenu[wine]) activeMenu[wine] = []; activeMenu[wine].push(row); } });
      document.getElementById('resMenu').style.display = 'none';
      status.innerText = `${res} Active`;
    }

    async function handleAction() {
      if (appMode === 'Menu List') takeSnapshot();
      else captureAndUpload();
    }

    async function captureAndUpload() {
      status.innerHTML = '<div class="spinner"></div> Uploading...';
      canvas.width = video.videoWidth; canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);
      const base64 = canvas.toDataURL('image/png');
      const result = await worker.recognize(canvas);
      
      fetch(GAS_URL, {
        method: "POST",
        body: JSON.stringify({ base64: base64, ocr: result.data.text, type: appMode })
      })
      .then(r => r.json())
      .then(res => {
        if(res.success) { status.innerText = "Saved to Drive!"; }
        else { alert("Error: " + res.error); status.innerText = "Error"; }
      })
      .catch(e => { alert("Post Failed: Check permissions in Google Script."); });
    }

    async function takeSnapshot() {
      status.innerHTML = '<div class="spinner"></div> Analyzing...';
      canvas.width = video.videoWidth; canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);
      const result = await worker.recognize(canvas);
      processLines(result.data.lines);
    }

    function processLines(lines) {
      ctx.drawImage(video, 0, 0);
      lines.forEach(line => {
        const txt = clean(line.text);
        Object.keys(activeMenu).forEach(key => { if (txt.includes(key) && key.length > 4) drawOverlay(line.bbox, activeMenu[key][0][1], activeMenu[key]); });
      });
      status.innerText = "Scan Complete";
    }

    function drawOverlay(bbox, name, rows) {
        const fontSize = 14, lineHeight = 20, padding = 15;
        let displayTexts = [];
        const rowsToProcess = (currentMode === "somm") ? rows : [rows[0]];
        rowsToProcess.forEach(row => {
          if (currentMode === "somm" && row[3]) displayTexts.push(row[3]);
          if (currentMode === "ai") { if(row[4]) displayTexts.push(row[4]); if(row[5]) displayTexts.push(row[5]); }
          if (currentMode === "expert") { if(row[7]) displayTexts.push(row[7]); if(row[8]) displayTexts.push(row[8]); if(row[9]) displayTexts.push(row[9]); }
          if (currentMode === "basic") { if(row[10]) displayTexts.push(row[10]); if(row[11]) displayTexts.push(row[11]); if(row[12]) displayTexts.push(row[12]); }
        });
        displayTexts = displayTexts.filter(t => t);
        if (displayTexts.length === 0) return;

        ctx.font = `bold ${fontSize}px Arial`;
        const title = name.toUpperCase();
        let maxW = ctx.measureText(title).width;
        ctx.font = `${fontSize - 2}px Arial`;
        displayTexts.forEach(t => { const w = ctx.measureText("• " + t).width; if (w > maxW) maxW = w; });
        
        const boxWidth = maxW + (padding * 2), totalH = (displayTexts.length + 1) * lineHeight + (padding * 2);
        ctx.fillStyle = "rgba(0,0,0,0.92)"; ctx.beginPath(); ctx.roundRect(bbox.x0, bbox.y0 - totalH - 10, boxWidth, totalH, 10); ctx.fill();
        ctx.fillStyle = "#34C759"; ctx.font = `bold ${fontSize}px Arial`; ctx.fillText(title, bbox.x0 + padding, bbox.y0 - totalH + padding + 14);
        ctx.fillStyle = "white"; ctx.font = `${fontSize - 2}px Arial`;
        displayTexts.forEach((t, i) => { ctx.fillText("• " + t, bbox.x0 + padding, bbox.y0 - totalH + padding + 14 + (lineHeight * (i+1))); });
        ctx.strokeStyle = "#34C759"; ctx.lineWidth = 3; ctx.strokeRect(bbox.x0, bbox.y0, bbox.x1 - bbox.x0, bbox.y1 - bbox.y0);
    }

    function clean(str) { return str ? str.toString().normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().replace(/[^a-z0-9 ]/g, '').trim() : ""; }
    function toggleMenu(id) { const el = document.getElementById(id); el.style.display = el.style.display === 'flex' ? 'none' : 'flex'; }
    function setMode(mode, el) { currentMode = mode; document.querySelectorAll('#modeMenu .menu-item').forEach(i => i.classList.remove('active')); el.classList.add('active'); toggleMenu('modeMenu'); }
  </script>
</body>
</html>
