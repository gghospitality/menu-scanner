<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sommurai AI</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    body { margin: 0; background: #000; font-family: -apple-system, sans-serif; height: 100vh; overflow: hidden; color: white; }
    
    /* SPLASH SCREEN */
    #splash-screen {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: #ffffff; display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 9999;
    }
    #splash-screen img { width: 70%; max-width: 350px; margin-top: 20px; }
    #splash-buttons { width: 85%; display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; }
    .splash-btn { padding: 16px; border-radius: 12px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; color: white; }
    .btn-blue { background: #002d58; }
    .btn-green { background: #34C759; }

    /* LAYOUT */
    #container { position: relative; flex-grow: 1; height: calc(100vh - 160px); background: #111; overflow: hidden; }
    video { width: 100%; height: 100%; object-fit: cover; }
    canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
    
    /* MENUS */
    #menu-nav { position: fixed; top: 50px; left: 15px; display: flex; flex-direction: column; gap: 15px; z-index: 3000; display: none; } /* Hidden by default */
    .menu-trigger { background: rgba(40,40,40,0.95); border: 1px solid #555; color: white; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; }
    .menu-content { position: absolute; left: 60px; top: 0; background: rgba(25,25,25,0.98); border: 1px solid #444; border-radius: 15px; display: none; flex-direction: column; min-width: 220px; max-height: 400px; overflow-y: auto; }
    .menu-item { padding: 16px; border-bottom: 1px solid #333; font-size: 14px; }
    .menu-item.active { border-left: 5px solid #34C759; background: #222; }

    #status { position: fixed; top: 55px; right: 15px; width: 45%; background: rgba(0,0,0,0.75); color: #34C759; padding: 10px; border-radius: 20px; text-align: center; font-size: 11px; z-index: 1000; }
    #controls { height: 160px; background: #1a1a1a; display: flex; justify-content: center; align-items: center; padding-bottom: 40px; border-top: 1px solid #333; }
    .action-btn { padding: 18px 40px; font-size: 18px; border-radius: 35px; border: none; font-weight: bold; width: 85%; background: #34C759; color: white; }
    
    .spinner { border: 2px solid #333; border-top: 2px solid #34C759; border-radius: 50%; width: 14px; height: 14px; animation: spin 1s linear infinite; display: inline-block; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="splash-screen">
    <div id="splash-buttons">
        <button class="splash-btn btn-blue" onclick="startFlow('Scan Menu')">Scan Menu</button>
        <button class="splash-btn btn-blue" onclick="startFlow('Scan Wine List')">Scan Wine List</button>
        <button class="splash-btn btn-green" onclick="startFlow('Menu List')">Menu List</button>
    </div>
    <img src="logo.png" alt="Sommurai Logo">
  </div>

  <div id="menu-nav">
    <div class="menu-group"><div class="menu-trigger" onclick="toggleMenu('resMenu')">🍴</div><div id="resMenu" class="menu-content"></div></div>
    <div class="menu-group" id="logic-menu" style="display:none;"><div class="menu-trigger" onclick="toggleMenu('modeMenu')">💡</div><div id="modeMenu" class="menu-content">
        <div class="menu-item active" onclick="setMode('somm', this)">Somm Pick (D)</div>
        <div class="menu-item" onclick="setMode('ai', this)">AI Somm Pick (E,F)</div>
        <div class="menu-item" onclick="setMode('expert', this)">Expert (H,I,J)</div>
        <div class="menu-item" onclick="setMode('basic', this)">Basic (K,L,M)</div>
    </div></div>
  </div>

  <div id="status">Syncing...</div>
  <div id="container"><video id="video" autoplay playsinline muted></video><canvas id="overlay"></canvas></div>
  <div id="controls"><button id="mainBtn" class="action-btn" onclick="handleAction()">CAPTURE</button></div>

  <script>
    const video = document.getElementById('video'), canvas = document.getElementById('overlay'), ctx = canvas.getContext('2d');
    const status = document.getElementById('status'), mainBtn = document.getElementById('mainBtn');
    let rawSheetData = [], activeMenu = {}, currentMode = 'somm', appMode = '', worker = null;

    const GAS_URL = "https://script.google.com/macros/s/AKfycbxVbdL5svqZfDWwICiI3TbrG2yX3s5P0sg5aeo0agQUhDaC77IvpBskwFFFdrtM1K64/exec";

    async function startFlow(mode) {
      appMode = mode;
      document.getElementById('splash-screen').style.display = 'none';
      if (mode === 'Menu List') {
        document.getElementById('menu-nav').style.display = 'flex';
        document.getElementById('logic-menu').style.display = 'block';
        mainBtn.innerText = "4. SCAN WINE LIST";
      } else {
        mainBtn.innerText = "CAPTURE & UPLOAD";
      }
      initCamera();
      loadSheetData();
    }

    async function initCamera() {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: { ideal: 1920 } }, audio: false });
      video.srcObject = stream;
      worker = await Tesseract.createWorker('eng');
      status.innerText = "Camera Ready";
    }

    async function loadSheetData() {
      const resp = await fetch(GAS_URL, { redirect: 'follow' });
      rawSheetData = await resp.json();
      populateRestaurants();
    }

    function populateRestaurants() {
      const resContainer = document.getElementById('resMenu');
      const restaurants = [...new Set(rawSheetData.slice(1).map(row => row[0]))].filter(r => r).sort();
      resContainer.innerHTML = restaurants.map(r => `<div class="menu-item" onclick="setRestaurant('${r.replace(/'/g, "\\'")}', this)">${r}</div>`).join('');
      if (restaurants.length > 0) setRestaurant(restaurants[0], resContainer.firstChild);
    }

    function setRestaurant(res, el) {
      activeMenu = {};
      rawSheetData.slice(1).forEach(row => { if (row[0] === res) { const wine = clean(row[1]); if (!activeMenu[wine]) activeMenu[wine] = []; activeMenu[wine].push(row); } });
      document.getElementById('resMenu').style.display = 'none';
      status.innerText = `${res} Active`;
    }

    async function handleAction() {
      if (appMode === 'Menu List') { takeSnapshot(); }
      else { captureAndUpload(); }
    }

    async function captureAndUpload() {
      status.innerHTML = '<div class="spinner"></div> Processing Upload...';
      canvas.width = video.videoWidth; canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);
      const base64 = canvas.toDataURL('image/png');
      const result = await worker.recognize(canvas);
      
      // Call GAS Upload
      google.script.run.withSuccessHandler((res) => {
        status.innerText = "Upload Success!";
        document.getElementById('logic-menu').style.display = 'block'; // Enable lightbulb
      }).uploadGrab(base64, result.data.text, appMode);
    }

    async function takeSnapshot() {
      status.innerHTML = '<div class="spinner"></div> Scanning...';
      canvas.width = video.videoWidth; canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);
      const result = await worker.recognize(canvas);
      processLines(result.data.lines);
    }

    function processLines(lines) {
      ctx.drawImage(video, 0, 0);
      lines.forEach(line => {
        const txt = clean(line.text);
        Object.keys(activeMenu).forEach(key => { if (txt.includes(key) && key.length > 4) drawOverlay(line.bbox, activeMenu[key][0][1], activeMenu[key]); });
      });
    }

    function drawOverlay(bbox, name, rows) {
        const fontSize = 16, lineHeight = 22, padding = 12;
        let displayTexts = [];
        const rowsToProcess = (currentMode === "somm") ? rows : [rows[0]];
        rowsToProcess.forEach(row => {
          if (currentMode === "somm") displayTexts.push(row[3]);
          if (currentMode === "ai") { displayTexts.push(row[4]); displayTexts.push(row[5]); }
          if (currentMode === "expert") { displayTexts.push(row[7]); displayTexts.push(row[8]); displayTexts.push(row[9]); }
          if (currentMode === "basic") { displayTexts.push(row[10]); displayTexts.push(row[11]); displayTexts.push(row[12]); }
        });
        displayTexts = displayTexts.filter(t => t);
        ctx.font = `bold ${fontSize}px Arial`;
        const totalH = (displayTexts.length + 1) * lineHeight + (padding * 2);
        ctx.fillStyle = "rgba(0,0,0,0.9)"; ctx.roundRect(bbox.x0, bbox.y0 - totalH - 10, 300, totalH, 10); ctx.fill();
        ctx.fillStyle = "#34C759"; ctx.fillText(name.toUpperCase(), bbox.x0 + padding, bbox.y0 - totalH + padding + fontSize);
        ctx.fillStyle = "white"; ctx.font = `${fontSize - 2}px Arial`;
        displayTexts.forEach((t, i) => ctx.fillText("• " + t, bbox.x0 + padding, bbox.y0 - totalH + padding + fontSize + (lineHeight * (i+1))));
    }

    function clean(str) { return str ? str.toString().normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().replace(/[^a-z0-9 ]/g, '').trim() : ""; }
    function toggleMenu(id) { const el = document.getElementById(id); el.style.display = el.style.display === 'flex' ? 'none' : 'flex'; }
    function setMode(mode, el) { currentMode = mode; document.querySelectorAll('#modeMenu .menu-item').forEach(i => i.classList.remove('active')); el.classList.add('active'); toggleMenu('modeMenu'); }
  </script>
</body>
</html>
