<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Menu AI Scanner</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    body { margin: 0; background: #000; font-family: -apple-system, sans-serif; display: flex; flex-direction: column; height: 100vh; color: white; overflow: hidden; }
    #container { position: relative; flex-grow: 1; display: flex; align-items: center; justify-content: center; background: #111; }
    video { width: 100%; height: 100%; object-fit: cover; }
    canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
    #controls { height: 140px; background: #1a1a1a; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 10px; padding-bottom: 20px; }
    button { padding: 15px 40px; font-size: 18px; border-radius: 30px; border: none; font-weight: bold; width: 80%; transition: 0.2s; }
    #startBtn { background: #007AFF; color: white; }
    #scanBtn { background: #34C759; color: white; display: none; }
    #status { position: fixed; top: 40px; width: 80%; left: 10%; background: rgba(0,0,0,0.85); padding: 12px; border-radius: 25px; text-align: center; z-index: 100; font-size: 14px; border: 1px solid #333; }
    .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #34C759; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 10px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="status">Syncing with Google Sheets...</div>

  <div id="container">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
  </div>

  <div id="controls">
    <button id="startBtn" onclick="initApp()">1. ENABLE CAMERA</button>
    <button id="scanBtn" onclick="takeSnapshot()">2. SCAN MENU</button>
    <div id="debug-info" style="font-size: 10px; color: #666;">v1.0 - No Iframe Mode</div>
  </div>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('overlay');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');
    const startBtn = document.getElementById('startBtn');
    const scanBtn = document.getElementById('scanBtn');
    
    let menuData = {};
    let worker = null;

    // --- CONFIGURATION ---
    // PASTE YOUR GOOGLE SCRIPT URL HERE
    const GAS_URL = "PASTE_YOUR_APPS_SCRIPT_URL_HERE";

    // 1. Load data as soon as the page opens
    window.onload = loadSheetData;

async function loadSheetData() {
  const GAS_URL = "YOUR_NEW_EXEC_URL_HERE"; 
  
  try {
    status.innerText = "Connecting to Google...";
    const response = await fetch(GAS_URL);
    
    if (!response.ok) throw new Error('Network response was not ok');
    
    menuData = await response.json();
    console.log("Data Loaded:", menuData);
    status.innerText = "Menu Synced. Ready!";
    
  } catch (err) {
    console.error("Fetch error:", err);
    status.innerText = "Sync Error: " + err.message;
    alert("Sync Error: Make sure your Google Script is deployed to 'Anyone'.");
  }
}

    // 2. Initialize Camera & OCR on User Tap
    async function initApp() {
      status.innerHTML = '<div class="loading-spinner"></div> Starting Camera...';
      
      const constraints = { 
        video: { facingMode: { ideal: "environment" }, width: { ideal: 1280 } }, 
        audio: false 
      };

      try {
        const stream = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = stream;
        
        startBtn.style.display = "none";
        scanBtn.style.display = "block";
        status.innerText = "Initializing AI Engine...";

        // Start Tesseract AI
        worker = await Tesseract.createWorker('eng');
        status.innerText = "Ready! Point and Scan.";
      } catch (err) {
        alert("Camera Error: " + err.message);
        status.innerText = "Access Denied.";
      }
    }

    // 3. Capture and Process
    async function takeSnapshot() {
      if (!worker) return;
      
      status.innerHTML = '<div class="loading-spinner"></div> Scanning Items...';
      scanBtn.disabled = true;

      // Match canvas to camera resolution
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      
      // Freeze the frame
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      video.style.opacity = "0.2"; 

      try {
        const { data } = await worker.recognize(canvas);
        processResults(data.lines);
      } catch (err) {
        status.innerText = "Scan Failed.";
        resetUI();
      }
    }

    function processResults(lines) {
      let matches = 0;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height); // redraw clear image

      lines.forEach(line => {
        const text = line.text.toLowerCase().trim();
        
        Object.keys(menuData).forEach(item => {
          if (text.includes(item) && item.length > 2) {
            drawBox(line.bbox, item, menuData[item]);
            matches++;
          }
        });
      });

      status.innerText = matches > 0 ? `Found ${matches} items!` : "No items found. Try again.";
      setTimeout(resetUI, 4000); // Reset after 4 seconds
    }

    function drawBox(bbox, name, info) {
      ctx.strokeStyle = "#34C759";
      ctx.lineWidth = 10;
      ctx.strokeRect(bbox.x0, bbox.y0, bbox.x1 - bbox.x0, bbox.y1 - bbox.y0);

      ctx.fillStyle = "#34C759";
      ctx.font = "bold 34px Arial";
      ctx.fillText(name.toUpperCase() + ": " + info, bbox.x0, bbox.y0 - 20);
    }

    function resetUI() {
      video.style.opacity = "1";
      scanBtn.disabled = false;
      status.innerText = "Ready for next scan";
      ctx.clearRect(0,0, canvas.width, canvas.height);
    }
  </script>
</body>
</html>
