<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sommurai AR Pro v4.4</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    body { margin: 0; background: #000; font-family: -apple-system, sans-serif; height: 100vh; overflow: hidden; color: white; }
    #splash-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: space-between; z-index: 9999; padding: 60px 0; box-sizing: border-box; }
    #splash-buttons { width: 85%; display: flex; flex-direction: column; gap: 15px; }
    .splash-btn { padding: 20px; border-radius: 15px; border: none; font-weight: bold; font-size: 18px; cursor: pointer; color: white; background: #002d58; }
    #container { position: relative; flex-grow: 1; background: #000; overflow: hidden; }
    video { width: 100%; height: 100%; object-fit: cover; }
    canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; pointer-events: auto; z-index: 5; }
    #menu-nav { position: fixed; top: 55px; left: 15px; display: flex; flex-direction: column; gap: 15px; z-index: 3000; display: none; }
    .menu-trigger { background: rgba(40,40,40,0.95); border: 1px solid #555; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; color: white; }
    .menu-content { position: absolute; left: 60px; top: 0; background: #1a1a1a; border: 1px solid #444; border-radius: 15px; display: none; flex-direction: column; min-width: 220px; max-height: 400px; overflow-y: auto; }
    .menu-item { padding: 16px; border-bottom: 1px solid #333; font-size: 14px; color: #ccc; }
    #status { position: fixed; top: 65px; left: 50%; transform: translateX(-50%); width: 80%; background: rgba(0,0,0,0.85); color: #34C759; padding: 12px; border-radius: 25px; text-align: center; font-size: 12px; z-index: 1000; border: 1px solid #34C759; font-weight: bold; pointer-events: none; }
    #controls { min-height: 180px; background: #1a1a1a; display: flex; flex-direction: column; justify-content: center; align-items: center; padding-bottom: 100px; border-top: 1px solid #333; z-index: 1000; }
    .main-btn { padding: 20px 40px; font-size: 18px; border-radius: 35px; border: none; font-weight: bold; width: 85%; background: #34C759; color: white; transition: 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
    #startOverBtn { position: fixed; top: 15px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.5); color: white; padding: 5px 15px; border-radius: 15px; font-size: 10px; z-index: 5000; display: none; font-weight: bold; }
    #version-tag { position: fixed; bottom: 10px; right: 10px; font-size: 10px; color: #444; }
  </style>
</head>
<body>

  <div id="version-tag">v4.4</div>
  <button id="startOverBtn" onclick="location.reload()">↺ START OVER</button>

  <div id="splash-screen">
    <div id="splash-buttons">
        <button class="splash-btn" onclick="startFlow('Scan Wine List')">STEP 1: SCAN WINE LIST</button>
        <button class="splash-btn" style="background:#34C759" onclick="startFlow('Scan Menu')">STEP 2: SCAN FOOD MENU</button>
    </div>
    <img src="logo.png" style="width:250px">
  </div>

  <div id="menu-nav">
    <div class="menu-group"><div class="menu-trigger" onclick="toggleMenu('resMenu')">🍴</div><div id="resMenu" class="menu-content"></div></div>
    <div class="menu-group" id="logic-trigger"><div class="menu-trigger" onclick="toggleMenu('modeMenu')">💡</div><div id="modeMenu" class="menu-content">
        <div class="menu-item" onclick="setMode('somm', this)" style="color:#34C759">Somm Pick (D)</div>
        <div class="menu-item" onclick="setMode('ai', this)">AI Somm Pick (E,F)</div>
        <div class="menu-item" onclick="setMode('expert', this)">Expert (H,I,J)</div>
        <div class="menu-item" onclick="setMode('basic', this)">Basic (K,L,M)</div>
    </div></div>
  </div>

  <div id="status">Syncing Data...</div>
  <div id="container"><video id="video" autoplay playsinline muted></video><canvas id="overlay"></canvas></div>
  <div id="controls"><button id="actionBtn" class="main-btn" onclick="handleAction()">ACTION</button></div>

  <script>
    const video = document.getElementById('video'), canvas = document.getElementById('overlay'), ctx = canvas.getContext('2d');
    const status = document.getElementById('status'), actionBtn = document.getElementById('actionBtn'), startOverBtn = document.getElementById('startOverBtn');
    
    let rawSheetData = [], activeMenu = {}, currentMode = 'somm', appMode = '', worker = null;
    let wineListText = "", isScanning = false, persistentMatches = [], selectedItem = null;
    let wineListBuffer = new Set(), currentRestaurant = "GLOBAL";
    const DECAY_TIME = 10000;

    const GAS_URL = "https://script.google.com/macros/s/AKfycbwlxI5btA1I5HC2PMm1R5Z3_7LSSsPf4qsC6Z3aQS1_xExcYTY3uZEcuDhCm2pOuHc8/exec";

    async function startFlow(mode) {
      appMode = mode;
      const cam = await initCamera();
      if (cam) {
        document.getElementById('splash-screen').style.display = 'none';
        document.getElementById('menu-nav').style.display = 'flex';
        startOverBtn.style.display = 'block';
        updateButtonText();
        loadSheetData();
        initAI();
        requestAnimationFrame(renderLoop);
      }
    }

    async function initCamera() {
      try {
        const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: { ideal: 1280 } } });
        video.srcObject = s;
        return new Promise(r => video.onloadedmetadata = () => { video.play(); r(true); });
      } catch (e) { alert("Camera Access Error"); return false; }
    }

    async function initAI() {
      worker = await Tesseract.createWorker('eng', 1);
      status.innerText = "Engine Ready";
    }

    async function loadSheetData() {
      const r = await fetch(GAS_URL, { redirect: 'follow' });
      rawSheetData = await r.json();
      populateRestaurants();
    }

    function populateRestaurants() {
      const resContainer = document.getElementById('resMenu');
      const list = [...new Set(rawSheetData.slice(1).map(r => r[0]))].filter(r => r).sort();
      resContainer.innerHTML = `<div class="menu-item" onclick="setRes('GLOBAL')">🌎 Global Database</div>` + list.map(r => `<div class="menu-item" onclick="setRes('${r.replace(/'/g,"")}')">${r}</div>`).join('');
      setRes('GLOBAL');
    }

    function setRes(res) {
      activeMenu = {}; currentRestaurant = res;
      rawSheetData.slice(1).forEach(row => { if (res === 'GLOBAL' || row[0] === res) { const k = clean(row[1]); if (!activeMenu[k]) activeMenu[k] = []; activeMenu[k].push(row); } });
      document.getElementById('resMenu').style.display = 'none';
      status.innerText = res + " Brain Active";
    }

    function handleAction() {
      if (appMode === 'Scan Wine List' && isScanning) { finalizeWineScan(); return; }
      isScanning = !isScanning;
      updateButtonText();
      if (isScanning) runScanLoop();
      else persistentMatches = [];
    }

    function updateButtonText() {
        if (appMode === 'Scan Wine List') {
            actionBtn.innerText = isScanning ? "FINISH WINE SCAN" : "START WINE INDEXING";
            actionBtn.style.background = isScanning ? "#2196F3" : "#002d58";
        } else {
            actionBtn.innerText = isScanning ? "STOP LIVE MENU SCAN" : "START LIVE MENU SCAN";
            actionBtn.style.background = isScanning ? "#f44336" : "#34C759";
        }
    }

    async function runScanLoop() {
      if (!isScanning || !worker) return;
      const off = document.createElement('canvas'); off.width = 640; off.height = video.videoHeight * (640 / video.videoWidth);
      off.getContext('2d').drawImage(video, 0, 0, off.width, off.height);
      try {
        const result = await worker.recognize(off);
        if (appMode === 'Scan Wine List') {
            const now = Date.now();
            result.data.lines.forEach(l => {
                const txt = clean(l.text);
                if (txt.length > 7 && (/\d/.test(txt) || txt.includes('brut') || txt.includes('pinot') || txt.includes('glass'))) {
                    wineListBuffer.add(l.text);
                    persistentMatches.push({ pos: { x: (l.bbox.x0+l.bbox.x1)/2 * (canvas.width/640), y: (l.bbox.y0+l.bbox.y1)/2 * (canvas.height/(640*video.videoHeight/video.videoWidth)) }, isWineLine: true, lastSeen: now });
                }
            });
            status.innerText = `Indexing: ${wineListBuffer.size} items identified`;
        } else {
            updateFoodBuffer(result.data.lines, off.width, off.height);
        }
      } catch (e) {}
      if (isScanning) setTimeout(runScanLoop, 500);
    }

    function finalizeWineScan() {
      isScanning = false;
      wineListText = clean(Array.from(wineListBuffer).join(' '));
      const off = document.createElement('canvas'); off.width = 1000; off.height = video.videoHeight * (1000 / video.videoWidth);
      off.getContext('2d').drawImage(video, 0, 0, off.width, off.height);
      fetch(GAS_URL, { method: "POST", body: JSON.stringify({ base64: off.toDataURL('image/jpeg', 0.5), ocr: Array.from(wineListBuffer).join('\n'), type: 'Scan Wine List', restaurant: currentRestaurant }) });
      appMode = 'Scan Menu'; persistentMatches = []; updateButtonText();
      status.innerText = "Wine Index Saved. Scan Menu!";
    }

    function updateFoodBuffer(lines, sw, sh) {
      const now = Date.now(), sx = canvas.width / sw, sy = canvas.height / sh;
      lines.forEach(line => {
        const scanText = clean(line.text);
        Object.keys(activeMenu).forEach(key => {
          
          // --- FIX 1: STRICTOR FOOD MATCHING ---
          // Break dish name into significant words (ignore small words like "with", "and", "+")
          const dishWords = key.split(' ').filter(w => w.length > 3 && w !== "with");
          // Count how many of those specific words appear in the scanned line
          const matches = dishWords.filter(word => scanText.includes(word)).length;
          
          // Requirement: At least 85% of dish words must match perfectly
          if (matches >= Math.ceil(dishWords.length * 0.85) && key.length > 4) {
            
            const rows = activeMenu[key];
            let options = (currentMode === 'somm' ? [rows[0][3]] : currentMode === 'ai' ? [rows[0][4], rows[0][5]] : [rows[0][7], rows[0][8]]);
            
            // --- FIX 2: STRICT WINE LIST FILTER ---
            const valid = options.filter(w => {
                if(!w || !wineListText) return false;
                // Match the producer (usually the first word of the wine recommendation)
                const producer = clean(w).split(' ')[0];
                return producer.length > 4 && wineListText.includes(producer);
            });
            
            if (valid.length > 0) {
              const color = valid[0].toLowerCase().includes('red') ? '#ff4444' : valid[0].toLowerCase().includes('rose') ? '#ff80ab' : '#ffeb3b';
              const boxPos = { x: (line.bbox.x0 + line.bbox.x1) / 2 * sx, y: (line.bbox.y0 + line.bbox.y1) / 2 * sy };
              const idx = persistentMatches.findIndex(m => m.id === key);
              if (idx > -1) { persistentMatches[idx].pos = boxPos; persistentMatches[idx].lastSeen = now; }
              else { persistentMatches.push({ id: key, name: rows[0][1], pos: boxPos, data: valid, color: color, lastSeen: now }); }
            }
          }
        });
      });
    }

    canvas.addEventListener('touchstart', (e) => {
        const r = canvas.getBoundingClientRect();
        const x = e.touches[0].clientX - r.left, y = e.touches[0].clientY - r.top;
        selectedItem = persistentMatches.find(m => !m.isWineLine && Math.hypot(m.pos.x - x, m.pos.y - y) < 80) || null;
    });

    function renderLoop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (canvas.width !== video.videoWidth) { canvas.width = video.videoWidth; canvas.height = video.videoHeight; }
      const now = Date.now();
      persistentMatches = persistentMatches.filter(m => now - m.lastSeen < DECAY_TIME);

      persistentMatches.forEach(m => {
        if (m.isWineLine) {
            ctx.strokeStyle = "#34C759"; ctx.lineWidth = 2; ctx.strokeRect(m.pos.x - 50, m.pos.y - 10, 100, 20);
        } else {
            // Interactive AR Dots
            const pulse = 1 + Math.sin(now / 300) * 0.15;
            ctx.beginPath(); ctx.arc(m.pos.x, m.pos.y, 25 * pulse, 0, Math.PI * 2);
            ctx.fillStyle = m.color; ctx.fill(); ctx.strokeStyle = "white"; ctx.lineWidth = 3; ctx.stroke();
            
            if (selectedItem && selectedItem.id === m.id) {
                const boxH = (m.data.length + 1) * 35 + 25;
                ctx.fillStyle = "rgba(0,0,0,0.95)";
                ctx.roundRect(m.pos.x + 40, m.pos.y - 80, 280, boxH, 15); ctx.fill();
                ctx.fillStyle = m.color; ctx.font = "bold 18px Arial"; ctx.fillText(m.name.toUpperCase(), m.pos.x + 55, m.pos.y - 40);
                ctx.fillStyle = "white"; ctx.font = "16px Arial";
                m.data.forEach((t, i) => ctx.fillText("• " + t, m.pos.x + 55, m.pos.y + (i * 32)));
            }
        }
      });
      requestAnimationFrame(renderLoop);
    }

    function clean(str) { return str ? str.toString().normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().replace(/[^a-z0-9 ]/g, '').trim() : ""; }
    function toggleMenu(id) { const el = document.getElementById(id); el.style.display = el.style.display === 'flex' ? 'none' : 'flex'; }
    function setMode(m, el) { currentMode = m; document.querySelectorAll('#modeMenu .menu-item').forEach(i => i.style.color = '#ccc'); el.style.color = '#34C759'; toggleMenu('modeMenu'); persistentMatches = []; selectedItem = null; }
  </script>
</body>
</html>
